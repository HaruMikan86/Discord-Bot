name: Run Tests

# main ブランチへの push と pull request のたびに自動でテストを実行する
"on":
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: pytestでテストを実行
        run: python -m pytest test_charts.py -v
